server:
  port: 0

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/campusdocs_user_db
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:Default890}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  instance:
    instanceId: ${spring.application.name}:${vcap.application.instance_id:${spring.application.instance_id:${random.value}}}